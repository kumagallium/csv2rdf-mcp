schema_info:
  title: Starrydata (Thermoelectric / Battery / Magnetic Materials)
  description: |
    Starrydata is a curated dataset of measurement curves digitized from
    materials science publications, currently focused on thermoelectric,
    battery, and magnetic materials.

    The model has three top-level entities, all of which are `prov:Entity`:

    - **sd:Paper** (schema:ScholarlyArticle) — a publication record with DOI,
      title, authors, journal, dates.
    - **sd:Sample** — a physical specimen prepared and measured in the paper;
      carries a composition string and zero or more sd:Descriptors (extracted
      structured metadata such as MaterialFamily / Form / FabricationProcess).
    - **sd:Curve** — a measurement curve digitized from a figure in the paper.
      Each curve has propertyX / propertyY labels (e.g. Temperature vs Seebeck
      coefficient), raw x[] / y[] JSON arrays, and pre-computed aggregates
      (xMin / xMax / yMin / yMax / pointCount) for fast range filtering.

    Every triple is generated by an explicit `sd:IngestionActivity`
    (prov:Activity), enabling provenance queries such as "which ingest run
    produced this curve?".

  endpoint: http://localhost:7878/query
  base_uri: https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#
  graphs:
    - default
  kw_search_tools: ["sparql"]
  # NOTE: togomcp の rdf_portal.py (line 340 / 377) は schema_info.categories と
  # keywords を find_databases / list_categories の対象として読む。AI が
  # 「Seebeck」「Bi2Te3」「thermoelectric」「熱電」のいずれで聞いても starrydata
  # にヒットするよう、ここに synonym を多めに登録する。
  categories:
    - materials
    - materials-science
    - physics
    - thermoelectric
    - battery
    - magnetic
    - measurement-curves
    - provenance
  keywords:
    # English
    - starrydata
    - thermoelectric
    - Seebeck
    - Seebeck coefficient
    - thermopower
    - electrical conductivity
    - thermal conductivity
    - resistivity
    - ZT
    - figure of merit
    - power factor
    - battery
    - magnetic
    - magnetization
    - susceptibility
    - measurement curve
    - digitized curve
    - composition
    - Bi2Te3
    - PbTe
    - SnSe
    - Sb2Te3
    - half-Heusler
    - skutterudite
    - clathrate
    # 日本語 (AI が日本語クエリで検索するケース対応)
    - 熱電
    - 熱電材料
    - ゼーベック係数
    - 熱起電力
    - 電池
    - 磁性
    - 物性値
    - 測定カーブ
    - 数値化曲線
  version:
    mie_version: "1.1"
    mie_created: "2026-05-28"
    data_version: "Phase 1 / papers + samples + curves"
    update_frequency: "irregular (manual re-ingest)"
  license:
    data_license: "CC BY 4.0 (starrydata upstream — verify with maintainers)"
    license_url: "https://creativecommons.org/licenses/by/4.0/"
  access:
    rate_limiting: "none (self-hosted)"
    max_query_timeout: "60 seconds"
    backend: "Oxigraph 0.4+"

shape_expressions: |
  PREFIX sd:      <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
  PREFIX sdr:     <https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/>
  PREFIX schema:  <https://schema.org/>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX bibo:    <http://purl.org/ontology/bibo/>
  PREFIX prov:    <http://www.w3.org/ns/prov#>

  <PaperShape> {
    a [ sd:Paper schema:ScholarlyArticle prov:Entity ] ;
    dcterms:identifier xsd:string ;
    schema:identifier xsd:string ? ;            # DOI
    schema:url IRI ? ;
    schema:name xsd:string ? ;                  # title
    schema:datePublished xsd:date ? ;
    schema:author @<PersonShape> * ;
    schema:isPartOf @<PeriodicalShape> ? ;
    schema:publisher xsd:string ? ;
    bibo:volume xsd:string ? ;
    bibo:issue xsd:string ? ;
    bibo:pages xsd:string ? ;
    sd:projectName xsd:string * ;
    dcterms:created xsd:string ? ;
    prov:wasGeneratedBy @<IngestionActivityShape> ?
  }

  <PersonShape> {
    a [ schema:Person prov:Agent ] ;
    schema:givenName xsd:string ? ;
    schema:familyName xsd:string ?
  }

  <PeriodicalShape> {
    a [ schema:Periodical ] ;
    schema:name xsd:string ;
    schema:alternateName xsd:string ?
  }

  <SampleShape> {
    a [ sd:Sample prov:Entity ] ;
    dcterms:identifier xsd:string ;            # 複合キー: {SID}-{sample_id}
    sd:rawSampleId xsd:string ;                # starrydata 内部の元 sample_id
    schema:name xsd:string ? ;
    sd:compositionString xsd:string ? ;
    sd:compositionDetails xsd:string ? ;
    sd:fromPaper @<PaperShape> ? ;
    sd:hasDescriptor @<DescriptorShape> * ;
    dcterms:created xsd:string ? ;
    dcterms:modified xsd:string ? ;
    prov:wasGeneratedBy @<IngestionActivityShape> ?
  }

  <DescriptorShape> {
    a [ sd:Descriptor ] ;
    sd:descriptorName xsd:string ;
    sd:descriptorCategory xsd:string ? ;
    sd:descriptorComment xsd:string ? ;
    sd:descriptorExtracted xsd:string ?
  }

  <CurveShape> {
    a [ sd:Curve prov:Entity ] ;
    dcterms:identifier xsd:string ;            # 複合キー: {SID}-{figure_id}-{sample_id}
    sd:rawFigureId xsd:string ;                # starrydata 内部の元 figure_id
    sd:figureName xsd:string ? ;
    sd:ofSample @<SampleShape> ? ;
    sd:propertyX xsd:string ? ;
    sd:propertyY xsd:string ? ;
    sd:unitXString xsd:string ? ;               # Phase 1 では raw 文字列 / Phase 2 で QUDT
    sd:unitYString xsd:string ? ;
    sd:xValuesJSON xsd:string ? ;               # raw JSON array
    sd:yValuesJSON xsd:string ? ;
    sd:xMin xsd:double ? ;
    sd:xMax xsd:double ? ;
    sd:yMin xsd:double ? ;
    sd:yMax xsd:double ? ;
    sd:pointCount xsd:integer ? ;
    sd:comments xsd:string ? ;
    sd:projectName xsd:string * ;
    dcterms:created xsd:string ? ;
    dcterms:modified xsd:string ? ;
    prov:wasGeneratedBy @<IngestionActivityShape> ?
  }

  <IngestionActivityShape> {
    a [ sd:IngestionActivity prov:Activity ] ;
    prov:atTime xsd:dateTime ;
    prov:endedAtTime xsd:dateTime ? ;
    prov:used IRI ;
    prov:wasAssociatedWith IRI
  }

sample_rdf_entries:
  - title: "Paper SID-6 with a Sample and a Seebeck Curve"
    description: |
      End-to-end example: a paper, one sample (Pb-Zn-Te-I composition), and one
      curve plotting Temperature vs Seebeck coefficient. The curve carries both
      the raw JSON arrays and pre-computed aggregates.
    rdf: |
      @prefix sd:      <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#> .
      @prefix sdr:     <https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/> .
      @prefix schema:  <https://schema.org/> .
      @prefix dcterms: <http://purl.org/dc/terms/> .
      @prefix prov:    <http://www.w3.org/ns/prov#> .
      @prefix xsd:     <http://www.w3.org/2001/XMLSchema#> .

      sdr:paper/6 a sd:Paper, schema:ScholarlyArticle, prov:Entity ;
          dcterms:identifier "6" ;
          schema:identifier "10.1021/am405410e" ;
          schema:name "Some Thermoelectric Paper" .

      sdr:sample/6-113 a sd:Sample, prov:Entity ;
          dcterms:identifier "6-113" ;       # 複合キー {SID}-{sample_id}
          sd:rawSampleId "113" ;              # starrydata 内部の元 sample_id
          schema:name "Pb1.00025Zn0.02Te1.02I0.0005" ;
          sd:compositionString "Pb1.00025Zn0.02Te1.02I0.0005" ;
          sd:fromPaper sdr:paper/6 ;
          sd:hasDescriptor sdr:descriptor/6-113/0 .

      sdr:descriptor/6-113/0 a sd:Descriptor ;
          sd:descriptorName "MaterialFamily" ;
          sd:descriptorCategory "PbTe" .

      sdr:curve/6-79-113 a sd:Curve, prov:Entity ;
          dcterms:identifier "6-79-113" ;     # 複合キー {SID}-{figure_id}-{sample_id}
          sd:rawFigureId "79" ;                # starrydata 内部の元 figure_id
          sd:figureName "6(b)" ;
          sd:ofSample sdr:sample/6-113 ;
          sd:propertyX "Temperature" ; sd:propertyY "Seebeck coefficient" ;
          sd:unitXString "K" ; sd:unitYString "V*K^(-1)" ;
          sd:xValuesJSON "[299.86,324.87,...,650.02]" ;
          sd:yValuesJSON "[-0.000148,...,-0.000286]" ;
          sd:xMin 299.86 ; sd:xMax 650.02 ;
          sd:yMin -2.862406e-4 ; sd:yMax -1.484452e-4 ;
          sd:pointCount 15 .

sparql_query_examples:
  - title: "Count papers / samples / curves"
    description: "Sanity check after ingest."
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT
        (COUNT(DISTINCT ?paper) AS ?papers)
        (COUNT(DISTINCT ?sample) AS ?samples)
        (COUNT(DISTINCT ?curve) AS ?curves)
      WHERE {
        { ?paper  a sd:Paper }
        UNION { ?sample a sd:Sample }
        UNION { ?curve  a sd:Curve }
      }

  - title: "Samples-per-paper top-N"
    description: |
      Find papers with the most samples. Useful for spotting comprehensive
      studies. Replace LIMIT to adjust.
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      PREFIX schema: <https://schema.org/>
      SELECT ?paper ?title (COUNT(?sample) AS ?nSamples) WHERE {
        ?sample a sd:Sample ; sd:fromPaper ?paper .
        ?paper schema:name ?title .
      }
      GROUP BY ?paper ?title ORDER BY DESC(?nSamples) LIMIT 10

  - title: "Samples by composition substring (e.g. Bi2Te3-like)"
    description: |
      Composition is stored as a literal string. CONTAINS(LCASE(...))
      is the recommended pattern; full-text indexing is future work.
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      PREFIX schema: <https://schema.org/>
      SELECT ?sample ?name ?comp WHERE {
        ?sample a sd:Sample ;
                sd:compositionString ?comp ;
                schema:name ?name .
        FILTER(CONTAINS(LCASE(STR(?comp)), "bi2te3"))
      }
      LIMIT 20

  - title: "Curves with the highest |yMax| (e.g. largest Seebeck)"
    description: |
      Uses the pre-computed sd:yMax aggregate so we never need to parse
      sd:yValuesJSON. Replace propertyY filter for other quantities.
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT ?curve ?figure ?yMax WHERE {
        ?curve sd:propertyY "Seebeck coefficient" ;
               sd:yMax ?yMax ;
               sd:figureName ?figure .
      }
      ORDER BY DESC(ABS(?yMax)) LIMIT 10

  - title: "Provenance: which ingestion run produced this curve?"
    description: |
      Backtrack from a sd:Curve to the sd:IngestionActivity that generated it,
      plus its start / end timestamps and software agent.
    query: |
      PREFIX prov: <http://www.w3.org/ns/prov#>
      PREFIX sd:   <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT ?curve ?activity ?atTime ?endedAtTime ?agent WHERE {
        ?curve a sd:Curve ;
               prov:wasGeneratedBy ?activity .
        ?activity prov:atTime ?atTime ;
                  prov:wasAssociatedWith ?agent .
        OPTIONAL { ?activity prov:endedAtTime ?endedAtTime }
      }
      LIMIT 5

cross_references:
  - source_property: "schema:identifier"
    target_db: "DOI (Crossref / DOI Foundation)"
    description: |
      The DOI literal on sd:Paper resolves at https://doi.org/<value>.
  - source_property: "sd:propertyX / sd:propertyY"
    target_db: "QUDT (qudt.org) — Phase 2"
    description: |
      Property labels are currently raw strings ("Temperature", "Seebeck
      coefficient"). Phase 2 will map them to QUDT quantity-kind IRIs.
  - source_property: "sd:unitXString / sd:unitYString"
    target_db: "QUDT unit:* — Phase 2"
    description: |
      Units are kept as raw strings ("K", "V*K^(-1)"). A unit_map.yaml
      (design-plan §4 "Unit normalization") will produce qudt:Unit IRIs
      in Phase 2.

architectural_notes: |
  - **IRI naming**: No blank nodes anywhere. Periodical, Author, Sample,
    Descriptor, Curve, and IngestionActivity all have stable IRIs. This makes
    re-ingest idempotent under SPARQL set semantics.
  - **Composite IRI keys (Phase 1 bug fix)**: starrydata's raw `sample_id` is
    not globally unique (9,661 collisions across papers) and `figure_id` is
    also reused across papers (4,466 collisions). The ingester therefore uses
    **composite keys** to avoid silently collapsing distinct measurements
    into a single IRI:
      - `sdr:sample/{SID}-{sample_id}`
      - `sdr:curve/{SID}-{figure_id}-{sample_id}`
      - `sdr:descriptor/{SID}-{sample_id}/{idx}`
    The original `sample_id` / `figure_id` is preserved as `sd:rawSampleId` /
    `sd:rawFigureId` for cross-referencing with the upstream CSVs.
  - **PROV-O**: Each ingest run mints one `sd:IngestionActivity` per CSV file
    (papers / samples / curves run separately, so 3 activities exist after a
    full load). Each generated entity has `prov:wasGeneratedBy` pointing at its
    activity. Query 5 above demonstrates the inversion.
  - **Curve x/y representation (design-plan §4 方針 C)**: Raw arrays are kept
    as JSON literals (sd:xValuesJSON / sd:yValuesJSON), and per-curve
    aggregates (xMin/xMax/yMin/yMax/pointCount) are emitted as separate
    typed triples for fast range filtering. **Known limitation**: a query
    like "Seebeck coefficient at 300-400 K specifically" cannot be answered
    by aggregates alone — clients must fetch the curve and parse the JSON
    array (a future MCP tool `template_curve_fetch` will encapsulate this).
  - **Host migration**: Phase 1 uses
    `https://kumagallium.github.io/csv2rdf-mcp/...` as the IRI prefix. Phase 2
    plans to switch to w3id.org redirect (design-plan §4.0); the IRI strings
    themselves will be preserved.

data_statistics:
  papers: "100 (Phase 1 smoke-test) / 56,390 (full starrydata)"
  samples: "611 (Phase 1 smoke-test, aligned with papers_100) / 144,091 (full)"
  curves: "2,457 (Phase 1 smoke-test, aligned) / 233,104 (full)"
  triples_in_subset: 49449

anti_patterns: |
  - Do NOT assume bnodes; the ingester is bnode-free by design.
  - Do NOT use `dcterms:created` as the ingestion timestamp — that field is
    the starrydata curator's original record timestamp. Use
    `prov:wasGeneratedBy/prov:atTime` for ingestion time.
  - Do NOT try to filter on a single point inside an x[] array via SPARQL;
    use the aggregates (sd:xMin / sd:xMax / sd:yMin / sd:yMax) or fetch the
    curve and parse client-side.
  - DescriptorShape entries with empty category / comment / extracted are
    DROPPED at ingest time (starrydata's CSV contains many blank descriptor
    templates). Do not expect every descriptor name to appear in the graph.
  - Do NOT use `sd:rawSampleId` / `sd:rawFigureId` as the lookup key — those
    values are reused across papers. Always join Sample/Curve via their
    composite IRI (`sdr:sample/{SID}-{sample_id}` etc.) or via the
    `sd:fromPaper` / `sd:ofSample` object property.

common_errors: |
  - **SP030 "Too many closing parentheses"** — only observed with the
    Virtuoso backend (Phase 0.5b spike). The Oxigraph backend is unaffected.
    Workaround if Virtuoso ever returns: use STR(?d) >= "..." instead of
    typed xsd:date FILTER.
  - **"404 from /sparql"** — Oxigraph uses `/query` (read) and `/update`
    (write). There is no `/sparql` endpoint.
  - **BOM in starrydata CSVs** — samples.csv and curves.csv ship as UTF-8 BOM;
    the ingester opens them with `utf-8-sig` to handle this transparently.
    If you write a custom downstream tool, do the same.

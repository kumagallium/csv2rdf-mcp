schema_info:
  title: Starrydata (Thermoelectric / Battery / Magnetic Materials)
  description: |
    Starrydata is a curated dataset of measurement curves digitized from
    materials science publications, currently focused on thermoelectric,
    battery, and magnetic materials. Each record is anchored to a paper
    (sd:Paper, schema:ScholarlyArticle), with samples (sd:Sample) and
    digitized measurement curves (sd:Curve) attached. Authors are first-class
    schema:Person entities, and every triple is generated by an explicit
    sd:IngestionActivity (prov:Activity) for full provenance traceability.

    Phase 1 ingests papers.csv only. Phase 2 will add samples and curves.

  endpoint: http://localhost:7878/query
  base_uri: https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#
  graphs:
    - default
  kw_search_tools: ["sparql"]
  version:
    mie_version: "1.1"
    mie_created: "2026-05-28"
    data_version: "Phase 1 / papers only"
    update_frequency: "irregular (manual re-ingest)"
  license:
    data_license: "CC BY 4.0 (starrydata upstream — verify with maintainers)"
    license_url: "https://creativecommons.org/licenses/by/4.0/"
  access:
    rate_limiting: "none (self-hosted)"
    max_query_timeout: "60 seconds"
    backend: "Oxigraph 0.4+"

shape_expressions: |
  PREFIX sd:      <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
  PREFIX sdr:     <https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/>
  PREFIX schema:  <https://schema.org/>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX bibo:    <http://purl.org/ontology/bibo/>
  PREFIX prov:    <http://www.w3.org/ns/prov#>

  <PaperShape> {
    a [ sd:Paper schema:ScholarlyArticle prov:Entity ] ;
    dcterms:identifier xsd:string ;
    schema:identifier xsd:string ? ;             # DOI
    schema:url IRI ? ;
    schema:name xsd:string ? ;                   # title
    schema:datePublished xsd:date ? ;
    schema:author @<PersonShape> * ;
    schema:isPartOf @<PeriodicalShape> ? ;
    schema:publisher xsd:string ? ;
    bibo:volume xsd:string ? ;
    bibo:issue xsd:string ? ;
    bibo:pages xsd:string ? ;
    sd:projectName xsd:string * ;
    dcterms:created xsd:string ? ;
    prov:wasGeneratedBy @<IngestionActivityShape> ?
  }

  <PersonShape> {
    a [ schema:Person prov:Agent ] ;
    schema:givenName xsd:string ? ;
    schema:familyName xsd:string ?
  }

  <PeriodicalShape> {
    a [ schema:Periodical ] ;
    schema:name xsd:string ;
    schema:alternateName xsd:string ?
  }

  <IngestionActivityShape> {
    a [ sd:IngestionActivity prov:Activity ] ;
    prov:atTime xsd:dateTime ;
    prov:endedAtTime xsd:dateTime ? ;
    prov:used IRI ;
    prov:wasAssociatedWith IRI
  }

sample_rdf_entries:
  - title: "Paper SID-1 (Snyder 2014, thermoelectric review in ACS Acc. Chem. Res.)"
    description: |
      Canonical example: 5 authors, a journal (Accounts of Chemical Research),
      a date, a DOI, and a back-reference to the ingestion activity.
    rdf: |
      @prefix sd:      <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#> .
      @prefix sdr:     <https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/> .
      @prefix schema:  <https://schema.org/> .
      @prefix dcterms: <http://purl.org/dc/terms/> .
      @prefix bibo:    <http://purl.org/ontology/bibo/> .
      @prefix prov:    <http://www.w3.org/ns/prov#> .
      @prefix xsd:     <http://www.w3.org/2001/XMLSchema#> .

      sdr:paper/1 a sd:Paper, schema:ScholarlyArticle, prov:Entity ;
          dcterms:identifier "1" ;
          schema:identifier "10.1021/ar400290f" ;
          schema:url <http://dx.doi.org/10.1021/ar400290f> ;
          schema:name "Decoupling Interrelated Parameters for Designing High Performance Thermoelectric Materials" ;
          schema:datePublished "2014-04-15"^^xsd:date ;
          schema:isPartOf sdr:periodical/accounts-of-chemical-research ;
          schema:publisher "American Chemical Society (ACS)" ;
          bibo:volume "47" ; bibo:issue "4" ; bibo:pages "1287-1295" ;
          sd:projectName "ThermoelectricMaterials", "GeneralDB" ;
          schema:author sdr:person/1/0, sdr:person/1/1 ;
          prov:wasGeneratedBy sdr:ingestion/run-20260528T000000Z .

      sdr:periodical/accounts-of-chemical-research a schema:Periodical ;
          schema:name "Accounts of Chemical Research" ;
          schema:alternateName "Acc. Chem. Res." .

      sdr:person/1/0 a schema:Person, prov:Agent ;
          schema:givenName "Chong" ; schema:familyName "Xiao" .

      sdr:ingestion/run-20260528T000000Z a sd:IngestionActivity, prov:Activity ;
          prov:atTime "2026-05-28T00:00:00+00:00"^^xsd:dateTime ;
          prov:used sdr:source/starrydata_papers.csv ;
          prov:wasAssociatedWith <https://github.com/kumagallium/csv2rdf-mcp> .

sparql_query_examples:
  - title: "Count all papers"
    description: "Sanity check. Should match ingester stats."
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT (COUNT(?p) AS ?n) WHERE { ?p a sd:Paper }

  - title: "Find papers by exact author family name"
    description: |
      Reverse lookup from a Person to their Paper. The author IRI is
      sdr:person/{paperSID}/{idx}; familyName is the indexed field.
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      PREFIX schema: <https://schema.org/>
      SELECT ?paper ?title WHERE {
        ?paper schema:author/schema:familyName "Snyder" ;
               schema:name ?title
      }
      LIMIT 20

  - title: "Recent papers (datePublished >= 2015)"
    description: |
      Date range query. Note: when the backend is Virtuoso instead of Oxigraph,
      prefer STR(?d) >= "2015-01-01" to avoid Virtuoso's auto-prepend
      `define sql:big-data-const 0` interaction with the xsd:date FILTER syntax
      (observed in Phase 0.5b spike).
    query: |
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      PREFIX schema: <https://schema.org/>
      SELECT ?paper ?title ?date WHERE {
        ?paper a sd:Paper ;
               schema:datePublished ?date ;
               schema:name ?title .
        FILTER (?date >= "2015-01-01"^^<http://www.w3.org/2001/XMLSchema#date>)
      }
      ORDER BY DESC(?date) LIMIT 50

  - title: "Papers from a specific journal"
    description: "Group by Periodical to see how many papers share each journal."
    query: |
      PREFIX schema: <https://schema.org/>
      PREFIX sd: <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT ?journalName (COUNT(?paper) AS ?n) WHERE {
        ?paper a sd:Paper ;
               schema:isPartOf ?journal .
        ?journal schema:name ?journalName .
      }
      GROUP BY ?journalName ORDER BY DESC(?n) LIMIT 20

  - title: "Provenance of an arbitrary paper"
    description: |
      Resolve which IngestionActivity produced a Paper. Useful for "when was
      this triple ingested?" debugging.
    query: |
      PREFIX prov: <http://www.w3.org/ns/prov#>
      PREFIX sd:   <https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#>
      SELECT ?paper ?activity ?startedAt ?endedAt WHERE {
        ?paper a sd:Paper ;
               prov:wasGeneratedBy ?activity .
        ?activity prov:atTime ?startedAt .
        OPTIONAL { ?activity prov:endedAtTime ?endedAt }
      }
      LIMIT 5

cross_references:
  - source_property: "schema:identifier"
    target_db: "DOI (Crossref / DOI Foundation)"
    description: |
      The DOI literal on sd:Paper resolves at https://doi.org/<value>. Useful
      for `dereference paper -> publisher landing page` and for joining with
      external bibliographic APIs (Crossref, OpenAlex).
  - source_property: "schema:url"
    target_db: "Publisher landing page"
    description: "Direct URL of the paper at the publisher (often DOI-redirected)."

architectural_notes: |
  - **IRI naming**: All entities have stable IRIs (no blank nodes). This is
    intentional so that re-ingest is idempotent under SPARQL set semantics.
    The Periodical IRI is sdr:periodical/{slug-of-journal-name}; thus two
    papers in the same journal share a Periodical resource without
    duplication.
  - **PROV-O**: Every ingest run mints one sd:IngestionActivity and attaches
    `prov:wasGeneratedBy` to every Paper/Person/Periodical it produced. This
    enables "which run produced this triple?" auditing.
  - **Host migration**: Phase 1 uses
    `https://kumagallium.github.io/csv2rdf-mcp/...` as the IRI prefix. Phase 2
    plans to switch to w3id.org redirect (design-plan §4.0); the underlying
    IRI strings will be preserved to avoid breaking external citations.

data_statistics:
  papers: "100 (smoke-test subset) — 56,390 (full Phase 1 once papers.csv is fully ingested)"
  samples: 0
  curves: 0

anti_patterns: |
  - Do not query for sd:Sample or sd:Curve in Phase 1; they are not yet
    populated. Use ASK { ?s a sd:Sample } to check availability.
  - Do not assume bnodes in the data. The ingester is bnode-free by design;
    any bnode in a query result indicates stale or corrupt data.
  - Do not infer the ingestion time from `dcterms:created` — that field is
    the **starrydata curator's** original import timestamp (string literal),
    not the csv2rdf-mcp ingestion time. Use `prov:wasGeneratedBy/prov:atTime`
    for the actual ingest timestamp.

common_errors: |
  - SP030 "Too many closing parentheses" — only seen with the Virtuoso backend
    (not Oxigraph). Caused by Virtuoso auto-prepending
    `define sql:big-data-const 0` and clashing with FILTER (?d >= "..."^^xsd:date).
    Workaround: use STR(?d) >= "..." comparison instead.
  - "404 from /sparql" — wrong endpoint. Oxigraph uses /query for SPARQL 1.1
    Query and /update for SPARQL 1.1 Update; there is no /sparql endpoint
    by default.

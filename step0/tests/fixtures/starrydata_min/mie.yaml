schema_info:
  title: Starrydata Minimal Fixture
  description: >-
    A tiny starrydata-shaped schema bundle committed to the repo so the 8-trap
    csv2rdf-validate checker runs end-to-end in CI without any external data.
  base_uri: https://example.com/starrydata/
  keywords:
    - thermoelectric
    - Seebeck
    - battery
    - magnetism
    - measurement curve
    - materials science
  categories:
    - materials science
    - measurement data

shape_expressions: |
  PREFIX sdr: <https://example.com/starrydata/resource/>
  PREFIX sd:  <https://example.com/starrydata/ontology#>
  # Composite IRIs: sdr:sample/{SID}-{sample_id} and
  # sdr:curve/{SID}-{figure_id}-{sample_id}. Paper is sdr:paper/{SID}.
  <PaperShape> {
    a [sd:Paper] ;
  }
  <SampleShape> {
    a [sd:Sample] ;
    sd:fromPaper @<PaperShape> ;
  }
  <CurveShape> {
    a [sd:Curve] ;
    sd:ofSample @<SampleShape> ;
  }

sample_rdf_entries:
  - id: sample-1-10
    rdf: |
      sdr:sample/1-10 a sd:Sample ;
        sd:fromPaper sdr:paper/1 .
  - id: curve-1-5-10
    rdf: |
      sdr:curve/1-5-10 a sd:Curve ;
        sd:ofSample sdr:sample/1-10 .

anti_patterns: |
  Do NOT mint sample IRIs as sdr:sample/{sample_id}. In the full database
  sample_id is paper-scoped and collides across SIDs; always use the composite
  (SID, sample_id) key. The single-key form is a negative example only.

architectural_notes: |
  Decision: composite IRIs keyed on (SID, sample_id) for samples and
  (SID, figure_id, sample_id) for curves; papers use the bare SID.
  Why: sample_id and figure_id repeat across papers, so a single key collides
  globally even though it looks unique on a subset.
  Alternatives: random UUIDs (loses the upstream SID link) — rejected.
  Trade-offs: longer IRIs, but stable, human-readable, and re-ingest idempotent.

# csv2rdf-mcp — Phase 1 compose
#
# Option B (Oxigraph + togomcp ハイブリッド) を local で立ち上げる最小構成。
# docs/architecture/option-b.md と整合。
#
# 使い方:
#   docker compose up -d --build
#   # ingester は host から CLI で実行 (Phase 1 段階では watcher 未実装):
#   #   uv run --project ingest csv2rdf-starrydata-papers \
#   #     /path/to/starrydata_papers.csv data/sources/rdf/starrydata/papers.ttl
#   #   curl -X POST --data-binary @data/sources/rdf/starrydata/papers.ttl \
#   #     -H 'Content-Type: text/turtle' http://localhost:7878/store?default
#   # MCP client は togomcp の HTTP transport (8000) に接続するか、
#   # togomcp standalone を host で起動して stdio で繋ぐ (Claude Desktop の場合は後者が標準):
#   #   uv pip install 'git+https://github.com/dbcls/togomcp.git'
#   #   TOGOMCP_DIR=$(pwd)/data/togomcp togo-mcp-local
#   docker compose down -v

services:

  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:latest
    container_name: csv2rdf_oxigraph
    command: >
      serve
      --location /data
      --bind 0.0.0.0:7878
    ports:
      - "7878:7878"   # SPARQL endpoint (read + write)
    volumes:
      - ./data/oxigraph_store:/data
    # NOTE: Oxigraph image は scratch-like で wget/curl/sh が無いため、TCP/HTTP
    # ベースの内部 healthcheck は書けない。代わりに togomcp 側で起動時に SPARQL
    # endpoint が応答するまで待つ ENTRYPOINT を持たせる (infra/togomcp/Dockerfile)。
    restart: unless-stopped

  togomcp:
    # dbcls/togomcp の公式 Docker image はまだ無いので csv2rdf-mcp 側で
    # 自前 build する (infra/togomcp/Dockerfile)。pin した commit SHA は
    # Dockerfile の TOGOMCP_REF ARG で管理。公式 image が出たら build: を
    # image: ghcr.io/dbcls/togomcp:<tag> に置き換えるだけ。
    # build context は repo root (Crucible の subdir build と統一)。
    # 開発時の MIE 編集を即反映するため、image に焼き込んだ /data/togomcp は
    # 下の volumes: で host 側のファイルにシャドウする。
    build:
      context: .
      dockerfile: infra/togomcp/Dockerfile
      # 任意で別の commit に上げたいときは:
      #   docker compose build --build-arg TOGOMCP_REF=<sha> togomcp
    container_name: csv2rdf_togomcp
    depends_on:
      - oxigraph
    environment:
      TOGOMCP_DIR: /data/togomcp
    volumes:
      - ./data/togomcp:/data/togomcp:ro
    ports:
      - "8000:8000"   # togomcp HTTP transport
    restart: unless-stopped

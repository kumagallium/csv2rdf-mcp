# csv2rdf-mcp — Phase 2 compose
#
# Option B (Oxigraph + togomcp ハイブリッド) + Phase 2 upload-api を local で
# 立ち上げる構成。docs/architecture/option-b.md と整合。
#
# 使い方:
#   docker compose up -d --build
#   # CSV を drop すれば upload-api 内の watcher が拾って Oxigraph に投入する:
#   #   cp /path/to/starrydata_papers.csv data/sources/csv/papers/
#   #   # または HTTP upload:
#   #   curl -F file=@papers.csv http://localhost:8080/upload/papers
#   # ジョブ履歴:
#   #   curl http://localhost:8080/jobs
#   # MCP client は togomcp の HTTP transport (8000) に接続するか、togomcp standalone
#   # を host で起動して stdio で繋ぐ (Claude Desktop の場合は後者が標準):
#   #   uv pip install 'git+https://github.com/dbcls/togomcp.git'
#   #   TOGOMCP_DIR=$(pwd)/data/togomcp togo-mcp-local
#   docker compose down -v

services:

  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:latest
    container_name: csv2rdf_oxigraph
    command: >
      serve
      --location /data
      --bind 0.0.0.0:7878
    ports:
      - "7878:7878"   # SPARQL endpoint (read + write)
    volumes:
      - ./data/oxigraph_store:/data
    # NOTE: Oxigraph image は scratch-like で wget/curl/sh が無いため、TCP/HTTP
    # ベースの内部 healthcheck は書けない。代わりに togomcp 側で起動時に SPARQL
    # endpoint が応答するまで待つ ENTRYPOINT を持たせる (infra/togomcp/Dockerfile)。
    restart: unless-stopped

  togomcp:
    # dbcls/togomcp の公式 Docker image はまだ無いので csv2rdf-mcp 側で
    # 自前 build する (infra/togomcp/Dockerfile)。pin した commit SHA は
    # Dockerfile の TOGOMCP_REF ARG で管理。公式 image が出たら build: を
    # image: ghcr.io/dbcls/togomcp:<tag> に置き換えるだけ。
    # build context は repo root (Crucible の subdir build と統一)。
    # 開発時の MIE 編集を即反映するため、image に焼き込んだ /data/togomcp は
    # 下の volumes: で host 側のファイルにシャドウする。
    build:
      context: .
      dockerfile: infra/togomcp/Dockerfile
      # 任意で別の commit に上げたいときは:
      #   docker compose build --build-arg TOGOMCP_REF=<sha> togomcp
    container_name: csv2rdf_togomcp
    depends_on:
      - oxigraph
    environment:
      TOGOMCP_DIR: /data/togomcp
    volumes:
      - ./data/togomcp:/data/togomcp:ro
    ports:
      - "8000:8000"   # togomcp HTTP transport
    restart: unless-stopped

  upload-api:
    # Phase 2: drop CSV -> auto reindex. FastAPI surface (POST /upload/{kind},
    # GET /jobs, GET /health) + an in-process watcher that runs the matching
    # starrydata ingester and POSTs the resulting Turtle to Oxigraph.
    build:
      context: .
      dockerfile: infra/upload-api/Dockerfile
    container_name: csv2rdf_upload_api
    depends_on:
      - oxigraph
    environment:
      CSV2RDF_OXIGRAPH_URL: http://oxigraph:7878
      CSV2RDF_DROP_ROOT: /data/sources/csv
      CSV2RDF_RDF_ROOT: /data/sources/rdf/starrydata
      CSV2RDF_ERROR_ROOT: /data/sources/errors/starrydata
      CSV2RDF_JOBS_LOG: /data/sources/jobs.jsonl
    volumes:
      - ./data/sources:/data/sources
    ports:
      # Host port is configurable: on machines where 8080 is already taken
      # (e.g. a running Crucible), set CSV2RDF_UPLOAD_API_PORT=8082 in a local
      # .env (gitignored). Container port stays 8080.
      - "${CSV2RDF_UPLOAD_API_PORT:-8080}:8080"
    restart: unless-stopped

  csv2rdf-mcp:
    # Phase 2 #3: self-built FastMCP server. Provides starrydata-specific
    # tools (currently just template_curve_fetch) that complement togomcp's
    # generic run_sparql. Connects to Oxigraph directly over mcp-net.
    build:
      context: .
      dockerfile: infra/csv2rdf-mcp/Dockerfile
    container_name: csv2rdf_self_mcp
    depends_on:
      - oxigraph
    environment:
      CSV2RDF_OXIGRAPH_URL: http://oxigraph:7878
    ports:
      - "8002:8002"   # FastMCP HTTP transport (path /mcp)
    restart: unless-stopped

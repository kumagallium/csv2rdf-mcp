# starrydata model — rdf-config 形式 (Phase 1 starrydata.ttl の対応版)
#
# rdf-config は example-driven。各 Subject に対して **代表的な 1 インスタンス**
# を書き、property の cardinality はマーカ (? / * / + / 無印) で示す。
# 値の型は sample から推論される。
#
# Phase 1 starrydata.ttl との対応:
# - sd:Paper       → Paper subject
# - sd:Sample      → Sample subject
# - sd:Curve       → Curve subject
# - sd:Descriptor  → Descriptor subject
# - sd:IngestionActivity → IngestionActivity subject
# - schema:Person  → Person subject
# - schema:Periodical → Periodical subject

- Paper <https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/paper/6>:
    - a: sd:Paper
    - dcterms:identifier:
        - sid: "6"
    - schema:identifier?:
        - doi: "10.1021/am405410e"
    - schema:url?:
        - paper_url: <http://dx.doi.org/10.1021/am405410e>
    - schema:name?:
        - title: "Some Thermoelectric Paper"
    - schema:datePublished?:
        - issued: "2014-04-15"
    - schema:isPartOf?:
        - periodical: Periodical
    - schema:author*:
        - author: Person
    - bibo:volume?:
        - volume: "47"
    - bibo:issue?:
        - issue: "4"
    - bibo:pages?:
        - pages: "1287-1295"
    - sd:projectName*:
        - paper_project: "ThermoelectricMaterials"
    - dcterms:created?:
        - paper_created_at: "Thu Jan 25 2018 13:56:56"
    - prov:wasGeneratedBy?:
        - paper_ingestion: IngestionActivity


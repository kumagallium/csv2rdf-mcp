id: https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology
name: starrydata
title: Starrydata Ontology (LinkML rewrite)
description: |
  LinkML rewrite of docs/ontology/starrydata.ttl for Phase 3 evaluation. The
  goal is to determine whether a single model.yaml can replace the four hand-
  authored artifacts (TBox / Mermaid / MIE shape_expressions / Python class
  scaffolds) that currently have to be kept in sync.

  Caveats:
  - LinkML's ShEx generator emits a single shape per class — the MIE
    shape_expressions block in Phase 1 nested PersonShape inside PaperShape
    via @<...>, which is also expressible here.
  - LinkML does not model "composite IRI key" directly. We capture the key
    composition via `id_prefixes` and a free-form comment instead.
  - bnode-free is enforced by giving every class an `identifier: true` slot.

license: https://www.apache.org/licenses/LICENSE-2.0
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  sd: https://kumagallium.github.io/csv2rdf-mcp/starrydata/ontology#
  sdr: https://kumagallium.github.io/csv2rdf-mcp/starrydata/resource/
  schemaorg: https://schema.org/  # NOTE: LinkML's linkml:types imports a `schema:` prefix at http://schema.org/ ; renamed to schemaorg to avoid the clash while keeping Phase 1 https://schema.org/ semantics.
  dcterms: http://purl.org/dc/terms/
  bibo: http://purl.org/ontology/bibo/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: sd
default_range: string

imports:
  - linkml:types

# ============================================================================
# Classes
# ============================================================================

classes:

  Paper:
    description: |
      A scholarly article that contains digitized measurement data. Each row
      in starrydata_papers.csv becomes one sd:Paper instance.
    class_uri: sd:Paper
    mixins:
      - HasIngestionProvenance
    is_a: null
    exact_mappings:
      - schemaorg:ScholarlyArticle
      - prov:Entity
    slots:
      - SID
      - doi
      - url
      - title
      - datePublished
      - isPartOf
      - author
      - publisher
      - volume
      - issue
      - pages
      - projectName
      - createdAt
    slot_usage:
      SID:
        identifier: true
        description: starrydata の Paper-level identifier。globally unique と仮定 (検証済)

  Sample:
    description: |
      A physical specimen prepared and measured in a paper. Carries a
      composition string and zero or more structured Descriptors.
    class_uri: sd:Sample
    mixins:
      - HasIngestionProvenance
    exact_mappings:
      - prov:Entity
    slots:
      - sampleCompositeKey
      - rawSampleId
      - sampleName
      - compositionString
      - compositionDetails
      - fromPaper
      - hasDescriptor
      - createdAt
      - modifiedAt
    slot_usage:
      sampleCompositeKey:
        identifier: true
        description: |
          ★ Phase 1 で観測した collision 対策: starrydata の sample_id は paper を
          跨ぐと重複するため、{SID}-{sample_id} の複合キーを id にする。元の
          sample_id は `rawSampleId` で残す。

  Curve:
    description: |
      A measurement curve digitized from a figure in the source paper. Phase 1
      keeps raw x/y arrays as JSON literals plus pre-computed aggregates
      (xMin/Max/yMin/Max/pointCount) for fast range filtering.
    class_uri: sd:Curve
    mixins:
      - HasIngestionProvenance
    exact_mappings:
      - prov:Entity
    slots:
      - curveCompositeKey
      - rawFigureId
      - figureName
      - ofSample
      - propertyX
      - propertyY
      - unitXString
      - unitYString
      - xValuesJSON
      - yValuesJSON
      - xMin
      - xMax
      - yMin
      - yMax
      - pointCount
      - comments
      - projectName
      - createdAt
      - modifiedAt
    slot_usage:
      curveCompositeKey:
        identifier: true
        description: |
          {SID}-{figure_id}-{sample_id} の三者複合キー。Phase 1 で
          (SID, figure_id, sample_id) が全件 100% ユニークと検証済。

  Descriptor:
    description: |
      Structured metadata extracted from the sample_info JSON column
      (MaterialFamily, Form, FabricationProcess, etc.). Entries with empty
      category/comment/extracted are dropped at ingest time.
    class_uri: sd:Descriptor
    slots:
      - descriptorCompositeKey
      - descriptorName
      - descriptorCategory
      - descriptorComment
      - descriptorExtracted
    slot_usage:
      descriptorCompositeKey:
        identifier: true
        description: '{SID}-{sample_id}/{idx} の複合キー'

  IngestionActivity:
    description: |
      A single run of the csv2rdf-mcp ingester. Each Paper/Sample/Curve
      generated in the run carries prov:wasGeneratedBy → IngestionActivity for
      provenance traceability.
    class_uri: sd:IngestionActivity
    exact_mappings:
      - prov:Activity
    slots:
      - runId
      - atTime
      - endedAtTime
      - used
      - wasAssociatedWith
    slot_usage:
      runId:
        identifier: true

  Person:
    description: An author or other PROV-O agent linked to a paper.
    class_uri: schemaorg:Person
    exact_mappings:
      - prov:Agent
    slots:
      - personCompositeKey
      - givenName
      - familyName
    slot_usage:
      personCompositeKey:
        identifier: true
        description: '{SID}/{author_index} の複合キー'

  Periodical:
    description: A journal / book series the paper appears in.
    class_uri: schemaorg:Periodical
    slots:
      - periodicalSlug
      - periodicalName
      - alternateName
    slot_usage:
      periodicalSlug:
        identifier: true

  # ------------------------------------------------------------------------
  # Mixin: PROV-O ingestion linkage
  # ------------------------------------------------------------------------
  HasIngestionProvenance:
    abstract: true
    mixin: true
    description: |
      Marker mixin: any Paper/Sample/Curve gets prov:wasGeneratedBy pointing
      at the IngestionActivity that emitted it. Concrete classes inherit the
      `wasGeneratedBy` slot.
    slots:
      - wasGeneratedBy

# ============================================================================
# Slots
# ============================================================================

slots:

  SID:
    slot_uri: dcterms:identifier
    description: starrydata paper identifier (SID 列の値)
    range: string
    required: true

  doi:
    slot_uri: schemaorg:identifier
    description: DOI literal (raw 文字列、IRI 化はせず)
    range: string

  url:
    slot_uri: schemaorg:url
    description: 論文のリンク URL
    range: uri

  title:
    slot_uri: schemaorg:name
    description: 論文タイトル
    range: string

  datePublished:
    slot_uri: schemaorg:datePublished
    description: |
      論文の出版日 (xsd:date)。issued JSON 列を parse して 1 月 1 日補完で normalize。
    range: date

  isPartOf:
    slot_uri: schemaorg:isPartOf
    description: 論文が属する Periodical (Journal)
    range: Periodical

  author:
    slot_uri: schemaorg:author
    description: 論文著者 (順序保持; ABox では index でユニーク化)
    range: Person
    multivalued: true

  publisher:
    slot_uri: schemaorg:publisher
    range: string

  volume:
    slot_uri: bibo:volume
    range: string

  issue:
    slot_uri: bibo:issue
    range: string

  pages:
    slot_uri: bibo:pages
    range: string

  projectName:
    slot_uri: sd:projectName
    description: starrydata curator が割り当てる project tag (Paper / Curve 両方に付くことがある)
    range: string
    multivalued: true

  createdAt:
    slot_uri: dcterms:created
    description: |
      Curator 側の record timestamp (free-form 文字列)。ingestion 時刻ではない
      ことに注意 — ingestion 時刻は prov:wasGeneratedBy/prov:atTime 経由で取れる。
    range: string

  modifiedAt:
    slot_uri: dcterms:modified
    range: string

  # ------ Sample slots ------

  sampleCompositeKey:
    slot_uri: dcterms:identifier
    range: string
    required: true

  rawSampleId:
    slot_uri: sd:rawSampleId
    description: starrydata の元 sample_id (paper を跨ぐと collide するので lookup 不可)
    range: string
    required: true

  sampleName:
    slot_uri: schemaorg:name
    range: string

  compositionString:
    slot_uri: sd:compositionString
    description: 'starrydata_samples.csv composition 列の raw 文字列 (e.g. "Bi2Te3")'
    range: string

  compositionDetails:
    slot_uri: sd:compositionDetails
    range: string

  fromPaper:
    slot_uri: sd:fromPaper
    description: Sample が報告された Paper
    range: Paper

  hasDescriptor:
    slot_uri: sd:hasDescriptor
    range: Descriptor
    multivalued: true

  # ------ Descriptor slots ------

  descriptorCompositeKey:
    slot_uri: dcterms:identifier
    range: string
    required: true

  descriptorName:
    slot_uri: sd:descriptorName
    description: 'e.g. MaterialFamily, Form, FabricationProcess, ThermalMeasurement.'
    range: string
    required: true

  descriptorCategory:
    slot_uri: sd:descriptorCategory
    range: string

  descriptorComment:
    slot_uri: sd:descriptorComment
    range: string

  descriptorExtracted:
    slot_uri: sd:descriptorExtracted
    range: string

  # ------ Curve slots ------

  curveCompositeKey:
    slot_uri: dcterms:identifier
    range: string
    required: true

  rawFigureId:
    slot_uri: sd:rawFigureId
    range: string
    required: true

  figureName:
    slot_uri: sd:figureName
    description: 'Figure label as printed in the source paper, e.g. "6(b)".'
    range: string

  ofSample:
    slot_uri: sd:ofSample
    description: Curve が測定対象とした Sample
    range: Sample

  propertyX:
    slot_uri: sd:propertyX
    description: |
      Phase 1 stores the raw label (e.g. "Temperature"). Phase 2 will
      normalize to a qudt:QuantityKind IRI.
    range: string

  propertyY:
    slot_uri: sd:propertyY
    range: string

  unitXString:
    slot_uri: sd:unitXString
    range: string

  unitYString:
    slot_uri: sd:unitYString
    range: string

  xValuesJSON:
    slot_uri: sd:xValuesJSON
    description: |
      Raw JSON-encoded array of x measurements (方針 C). Pre-computed
      aggregates xMin/xMax/pointCount are emitted as sibling slots.
    range: string

  yValuesJSON:
    slot_uri: sd:yValuesJSON
    range: string

  xMin:
    slot_uri: sd:xMin
    range: double
  xMax:
    slot_uri: sd:xMax
    range: double
  yMin:
    slot_uri: sd:yMin
    range: double
  yMax:
    slot_uri: sd:yMax
    range: double

  pointCount:
    slot_uri: sd:pointCount
    description: 'Number of (x,y) pairs in this curve (min(len(x), len(y))).'
    range: integer

  comments:
    slot_uri: sd:comments
    range: string

  # ------ IngestionActivity slots ------

  runId:
    slot_uri: dcterms:identifier
    description: 'Run identifier (e.g. "run-20260528T064500Z")'
    range: string
    required: true

  atTime:
    slot_uri: prov:atTime
    range: datetime
    required: true

  endedAtTime:
    slot_uri: prov:endedAtTime
    range: datetime

  used:
    slot_uri: prov:used
    description: 入力 CSV ファイルの IRI (`sdr:source/<basename>`)
    range: uri
    required: true

  wasAssociatedWith:
    slot_uri: prov:wasAssociatedWith
    description: csv2rdf-mcp の GitHub URL (software agent IRI)
    range: uri

  wasGeneratedBy:
    slot_uri: prov:wasGeneratedBy
    range: IngestionActivity

  # ------ Person slots ------

  personCompositeKey:
    slot_uri: dcterms:identifier
    range: string
    required: true

  givenName:
    slot_uri: schemaorg:givenName
    range: string

  familyName:
    slot_uri: schemaorg:familyName
    range: string

  # ------ Periodical slots ------

  periodicalSlug:
    slot_uri: dcterms:identifier
    description: 'lowercased / alphanumeric slug derived from container_title'
    range: string
    required: true

  periodicalName:
    slot_uri: schemaorg:name
    range: string

  alternateName:
    slot_uri: schemaorg:alternateName
    range: string

name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ingest:
    name: ingest tests (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        # NOTE: caching disabled until we ship uv.lock — setup-uv v3 with
        # enable-cache=true errors out when no lockfile matches.

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv and install ingest package
        working-directory: ingest
        run: |
          uv venv .venv --python 3.11
          uv pip install -e '.[dev]'

      - name: Ruff lint
        working-directory: ingest
        run: uv run ruff check src tests

      - name: Pytest
        working-directory: ingest
        run: uv run pytest tests/ -v

  api:
    name: upload API tests (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv and install api package (depends on ingest)
        working-directory: api
        run: |
          uv venv .venv --python 3.11
          uv pip install -e '../ingest'
          uv pip install -e '.[dev]'

      - name: Ruff lint
        working-directory: api
        run: uv run ruff check src tests

      - name: Pytest
        working-directory: api
        run: uv run pytest tests/ -v

  smoke-e2e:
    name: Oxigraph + togomcp smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        # NOTE: caching disabled until we ship uv.lock — setup-uv v3 with
        # enable-cache=true errors out when no lockfile matches.

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Start Oxigraph container
        run: |
          docker run -d --name oxigraph \
            -p 7878:7878 \
            ghcr.io/oxigraph/oxigraph:latest \
            serve --location /data --bind 0.0.0.0:7878
          # Wait until ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7878/ >/dev/null; then break; fi
            sleep 1
          done

      - name: Install ingest package + togomcp + fastmcp
        working-directory: experiments/phase1-smoke-test
        run: |
          uv venv .venv --python 3.11
          uv pip install \
            'git+https://github.com/dbcls/togomcp.git' \
            rdflib \
            fastmcp \
            -e ../../ingest

      - name: Generate papers_100 subset (commit-tracked sample CSV in fixtures)
        working-directory: experiments/phase1-smoke-test
        run: |
          # CI 環境では starrydata の CSV を fetch する権限が無いので、
          # repo 内に commit 済の fixture CSV を使う想定。Phase 1.5 で
          # fixture を追加する。今のところは小さなインライン fixture で代替:
          mkdir -p subset
          cat > subset/papers_100.csv <<'CSV'
          SID,DOI,URL,issued,author,title,container_title,container_title_short,volume,issue,page,ISSN,publisher,project_names,created_at
          1,10.1021/ar400290f,http://dx.doi.org/10.1021/ar400290f,"{""date_parts"":[[2014,4,15]]}","[{""given"":""Chong"",""family"":""Xiao""}]","""Decoupling Interrelated Parameters""","""Accounts of Chemical Research""","""Acc. Chem. Res.""",47,4,"""1287-1295""",0001-4842,"American Chemical Society (ACS)","[""ThermoelectricMaterials""]",Thu Jan 25 2018 13:56:56
          CSV

      - name: Convert to Turtle and load into Oxigraph
        working-directory: experiments/phase1-smoke-test
        run: |
          . .venv/bin/activate
          csv2rdf-starrydata-papers --no-prov subset/papers_100.csv subset/papers.ttl
          curl -sf -X POST -H 'Content-Type: application/sparql-update' \
            --data 'DROP DEFAULT' http://localhost:7878/update
          curl -sf -X POST --data-binary @subset/papers.ttl \
            -H 'Content-Type: text/turtle; charset=utf-8' \
            'http://localhost:7878/store?default'

      - name: Run MCP smoke test (togomcp ↔ Oxigraph round-trip)
        working-directory: experiments/phase1-smoke-test
        run: |
          . .venv/bin/activate
          # ci-mode: 1 paper だけなので test_smoke.py の assert "3715" を上書きする
          # 代わりに inline で最小 assert を実行
          python - <<'PY'
          import asyncio, os
          from pathlib import Path
          from fastmcp import Client
          from fastmcp.client.transports import StdioTransport

          here = Path.cwd()
          env = os.environ.copy()
          env["TOGOMCP_DIR"] = str(here / "togomcp-data")

          async def main():
              transport = StdioTransport(
                  command=str(here / ".venv" / "bin" / "togo-mcp-local"),
                  args=[],
                  env=env,
              )
              async with Client(transport) as client:
                  tools = await client.list_tools()
                  assert any(t.name == "run_sparql" for t in tools)
                  r = await client.call_tool("run_sparql", {
                      "database": "starrydata",
                      "sparql_query": "SELECT (COUNT(*) AS ?c) WHERE { ?s ?p ?o }",
                  })
                  text = "\n".join(c.text for c in r.content if hasattr(c, "text"))
                  # CI fixture loads 1 paper → 約 15-25 triples (PROV 無し設定)
                  count = int(text.strip().splitlines()[-1])
                  assert 5 < count < 100, f"unexpected triple count: {count}, body={text!r}"
                  print(f"OK: count={count}")

          asyncio.run(main())
          PY

      - name: Stop Oxigraph
        if: always()
        run: docker stop oxigraph && docker rm oxigraph
